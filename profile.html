<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link href="styles.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
</head>

<body class="bg-gradient-to-br from-[#D6E8E0] via-[#EDEAE3] to-[#F5E6D8]">
    <nav class="bg-neutral-primary fixed w-full z-20 top-0 start-0 md:bg-[#f3efe4]">
        <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
            <div class="flex flex-row gap-[10px]">
                <img src="images/Helplytics logo.png" class="h-7" alt="Flowbite Logo" />
                <span class="self-center text-xl text-heading font-semibold  flex flex-row">HelpHub AI</span>
            </div>
            <div class="inline-flex md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse gap-[10px]">
                <ul
                    class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-default rounded-base bg-neutral-secondary-soft md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-neutral-primary flex justify-center item-center">
                    <li class="">
                        <a href="#"
                            class="block py-2 px-3 w-[100px] h-[25px] text-[#c2c2b8]  hover:bg-[#dae1d9] md:hover:text-[#88a89e]  md:bg-transparent flex justify-center md:p-0 hover:rounded-[20px]"
                            aria-current="page">Dashboard</a>
                    </li>

                    <li>
                        <a href="#"
                            class="block py-2 px-3 w-[70px] h-[25px] text-[#c2c2b8]  hover:bg-[#dae1d9] md:hover:text-[#88a89e]  md:bg-transparent flex justify-center md:p-0 hover:rounded-[20px]">Explore</a>
                    </li>

                    <li class="">
                        <a href="#"
                            class="block py-2 px-3 w-[100px] h-[25px] text-[#c2c2b8]  hover:bg-[#dae1d9] md:hover:text-[#88a89e]  md:bg-transparent flex justify-center md:p-0 hover:rounded-[20px]">Messages</a>
                    </li>
                </ul>
            </div>
            <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1" id="navbar-cta">

            </div>
        </div>
    </nav>

    <a href="#"
        class="bg-neutral-primary-soft mt-[112px] block max-full p-6 bg-[#2a3234] border rounded-2xl shado-md ml-[7%] mr-[7%] mt-[5%] mb-[5%]">
        <h3 class="mb-3 text-2xl text-white">Profile</h3>
        <h1 class="text-white text-6xl font-extrabold mb-[15px]">Ayesha Khan</h1>
        <p class="text-white text-[20px]">Both.Karachi </p>
    </a>
    <section class="flex flex-row ">
        <div class="w-full  bg-white rounded-2xl shadow-md p-8 ml-[7%] mr-[7%]">

            <!-- Header -->
            <p class="text-xs font-semibold tracking-widest text-teal-600 uppercase mb-2">Public Profile</p>
            <h2 class="text-3xl font-extrabold text-gray-900 mb-6">Skills and reputation</h2>

            <!-- Trust Score -->
            <div class="flex justify-between items-center py-3 border-b border-gray-100">
                <span class="text-sm text-gray-700">Trust score</span>
                <span class="text-sm font-semibold text-gray-900">100%</span>
            </div>

            <!-- Contributions -->
            <div class="flex justify-between items-center py-3 border-b border-gray-100 mb-4">
                <span class="text-sm text-gray-700">Contributions</span>
                <span class="text-sm font-semibold text-gray-900">35</span>
            </div>

            <!-- Skills -->
            <div class="mb-5">
                <p class="text-sm font-bold text-gray-900 mb-2">Skills</p>
                <div class="flex flex-wrap gap-2">
                    <span
                        class="px-3 py-1 text-sm border border-gray-300 rounded-full text-gray-700 bg-white">Figma</span>
                    <span
                        class="px-3 py-1 text-sm border border-gray-300 rounded-full text-gray-700 bg-white">UI/UX</span>
                    <span
                        class="px-3 py-1 text-sm border border-gray-300 rounded-full text-gray-700 bg-white">HTML/CSS</span>
                    <span class="px-3 py-1 text-sm border border-gray-300 rounded-full text-gray-700 bg-white">Career
                        Guidance</span>
                </div>
            </div>

            <!-- Badges -->
            <div>
                <p class="text-sm font-bold text-gray-900 mb-2">Badges</p>
                <div class="flex flex-wrap gap-2">
                    <span class="px-3 py-1 text-sm border border-gray-300 rounded-full text-gray-700 bg-white">Design
                        Ally</span>
                    <span class="px-3 py-1 text-sm border border-gray-300 rounded-full text-gray-700 bg-white">Fast
                        Responder</span>
                    <span class="px-3 py-1 text-sm border border-gray-300 rounded-full text-gray-700 bg-white">Top
                        Mentor</span>
                </div>
            </div>

        </div>

        <div class="w-full max-w-md bg-white rounded-2xl shadow-md p-8 mr-[7%] ml[7%] ">

            <p class="text-xs font-semibold tracking-widest text-teal-600 uppercase mb-2">Edit Profile</p>
            <h2 class="text-3xl font-extrabold text-gray-900 mb-6 leading-tight">Update your<br />identity</h2>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block mb-1 text-sm font-medium text-gray-700">Name</label>
                    <input type="text" value="Ayesha Khan"
                        class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-teal-500 focus:border-teal-500 block w-full p-2.5" />
                </div>
                <div>
                    <label class="block mb-1 text-sm font-medium text-gray-700">Location</label>
                    <input type="text" value="Karachi"
                        class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-teal-500 focus:border-teal-500 block w-full p-2.5" />
                </div>
            </div>

            <div class="mb-4">
                <label class="block mb-1 text-sm font-medium text-gray-700">Skills</label>
                <input type="text" value="Figma, UI/UX, HTML/CSS, Career Guidance"
                    class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-teal-500 focus:border-teal-500 block w-full p-2.5" />
            </div>

            <div class="mb-6">
                <label class="block mb-1 text-sm font-medium text-gray-700">Interests</label>
                <input type="text" value="Hackathons, UI/UX, Community Building"
                    class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-teal-500 focus:border-teal-500 block w-full p-2.5">

            </div>

            <button type="button"
                class="w-full text-white bg-teal-600 hover:bg-teal-700 focus:ring-4 focus:ring-teal-300 font-semibold rounded-xl text-sm px-5 py-3 transition-all duration-200">
                Save profile
            </button>

        </div>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
</body>

</html>
