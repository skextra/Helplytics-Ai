<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helplytics Ai</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>
  <nav class="bg-neutral-primary fixed w-full z-20 top-0 start-0  md:bg-[#eeeee2]">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
      <div class="flex flex-row gap-[10px]">
        <img src="images/Helplytics logo.png" class="h-7" alt="Flowbite Logo" />
        <span class="self-center text-xl text-heading font-semibold  flex flex-row">HelpHub AI</span>
      </div>
      <div class="inline-flex md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse gap-[10px]">
        <button type="button"
          class=" bg-brand hover:bg-brand-strong box-border border border-transparent focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-3 py-2 focus:outline-none md:text-[#acada7] md:rounded-[20px] bg-[#fbfaf5]">Live
          community signals</button>
        <button type="button"
          class="text-white bg-brand hover:bg-brand-strong box-border border border-transparent focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-3 py-2 focus:outline-none md:bg-[#209b89] md:rounded-[20px]">Join
          the platform</button>
        <button data-collapse-toggle="navbar-cta" type="button"
          class="inline-flex items-center p-2 w-9 h-9 justify-center text-sm text-body rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary"
          aria-controls="navbar-cta" aria-expanded="false">
          <span class="sr-only">Open main menu</span>
          <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"
            viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14" />
          </svg>
        </button>
      </div>
      <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1" id="navbar-cta">
        <ul
          class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-default rounded-base bg-neutral-secondary-soft md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-neutral-primary flex justify-center item-center">
          <li class="">
            <a href="#"
              class="block py-2 px-3 w-[62px] h-[25px] text-[#494b44]  hover:bg-[#dae1d9] md:hover:text-[#173430]  md:bg-transparent flex justify-center md:p-0 hover:rounded-[20px]"
              aria-current="page">Home</a>
          </li>

          <li>
            <a href="#"
              class="block py-2 px-3 w-[70px] h-[25px] text-[#494b44]  hover:bg-[#dae1d9] md:hover:text-[#173430]  md:bg-transparent flex justify-center md:p-0 hover:rounded-[20px]">Explore</a>
          </li>

          <li class="">
            <a href="#"
              class="block py-2 px-3 w-[120px] h-[25px] text-[#494b44]  hover:bg-[#dae1d9] md:hover:text-[#173430]  md:bg-transparent flex justify-center md:p-0 hover:rounded-[20px]">Leaderboard</a>
          </li>
          <li>
            <a href="#"
              class="block py-2 px-3 w-[90px] h-[25px] text-[#494b44]  hover:bg-[#dae1d9] md:hover:text-[#173430]  md:bg-transparent flex justify-center md:p-0 hover:rounded-[20px]">AI
              Center</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

</body>

</html>
